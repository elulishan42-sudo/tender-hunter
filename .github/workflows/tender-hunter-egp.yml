name: Tender Hunter — EGP
on:
  schedule:
    - cron: '0 11 * * *' # 2PM Ethiopia time (UTC+3)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd .opencode && npm ci

      # EGP uses a public JSON API and doesn't need a browser; skipping
      # Playwright install saves ~30s per run.

      - name: Run scraper
        env:
          SOURCE: egp
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
          TENDERFLOW_API_KEY: ${{ secrets.TENDERFLOW_API_KEY }}
        run: node .opencode/scripts/tender-scraper.js
