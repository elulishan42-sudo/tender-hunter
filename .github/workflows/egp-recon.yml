name: EGP Recon
on:
  workflow_dispatch:

jobs:
  recon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd .opencode && npm ci

      - name: Install Playwright browsers
        run: cd .opencode && npx playwright install chromium --with-deps

      - name: Run recon
        run: node .opencode/scripts/egp-recon.js

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: egp-recon-${{ github.run_id }}
          path: .data/
          retention-days: 7
          include-hidden-files: true
