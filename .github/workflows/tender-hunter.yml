name: Tender Hunter Daily

on:
  schedule:
    # Run daily at 7:00 AM UTC (10:00 AM EAT)
    - cron: '0 7 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install playwright

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run Tender Scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
          MERKATO_EMAIL: ${{ secrets.MERKATO_EMAIL }}
          MERKATO_PASSWORD: ${{ secrets.MERKATO_PASSWORD }}
          TENDERFLOW_API_KEY: ${{ secrets.TENDERFLOW_API_KEY }}
          TENDERFLOW_USER_ID: ${{ secrets.TENDERFLOW_USER_ID }}
        run: node .opencode/scripts/tender-scraper.js
