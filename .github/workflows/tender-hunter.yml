name: Tender Hunter
on:
  schedule:
    # Public repo → unlimited Actions minutes + minimal cron throttling.
    # Three runs per hour at off-peak minutes (avoiding 0/15/30/45 high-load slots).
    - cron: '7 * * * *'
    - cron: '27 * * * *'
    - cron: '47 * * * *'
  workflow_dispatch:

# Skip overlapping runs — if a previous run is still going (unlikely, but
# possible on slow days), cancel it rather than queue another.
concurrency:
  group: tender-hunter
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore tender caches
        uses: actions/cache@v4
        with:
          path: |
            .opencode/data/tender-cache-merkato.json
            .opencode/data/tender-cache-egp.json
          # Unique key per run so we always save a fresh snapshot; restore-keys
          # pulls the latest matching prefix from a previous run.
          key: tender-cache-${{ github.run_id }}
          restore-keys: |
            tender-cache-

      - name: Install dependencies
        run: cd .opencode && npm ci

      - name: Install Playwright browsers
        run: cd .opencode && npx playwright install chromium --with-deps

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
          MERKATO_EMAIL: ${{ secrets.MERKATO_EMAIL }}
          MERKATO_PASSWORD: ${{ secrets.MERKATO_PASSWORD }}
          TENDERFLOW_API_KEY: ${{ secrets.TENDERFLOW_API_KEY }}
        run: node .opencode/scripts/tender-scraper.js
